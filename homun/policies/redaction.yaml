schema: homun.redaction-policy.v1
# Public-safety policy of intent for this project.
#
# Enforcement scope (be honest about what the automated gate actually does):
# `homun verify` runs a public-safety scan that detects the classes under
# `enforced` below: secret/key/token shapes and known local-path shapes. A match
# fails the gate closed. It does NOT detect free-form PII/PHI (names, emails,
# phone numbers, DOBs, MRNs, medical detail). The classes under
# `author_responsibility` are forbidden in public output but rely on using
# synthetic data and on human review, not automated detection.
#
# `redaction: passed` therefore means the automated secret/path scan found no
# matches, not a certification that the artifact is free of every class below.
# A first-class PII/PHI detector is on the roadmap (see issue #108).
deny:
  - pii
  - phi
  - secrets
  - tokens
  - raw_private_transcripts
  - private_screenshots
  - customer_data
  - patient_data
enforced:
  # Auto-detected by the verify public-safety scanner; a match fails closed.
  - secret_key_token_shapes
  - known_local_path_shapes
author_responsibility:
  # Forbidden in public output but NOT auto-detected today. Use synthetic data.
  - pii
  - phi
  - patient_data
  - customer_data
  - names_emails_and_other_identifiers
allow:
  - synthetic_personas
  - synthetic_fixtures
  - env_var_names
