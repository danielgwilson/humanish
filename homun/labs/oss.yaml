schema: homun.lab.v2
id: oss
title: OSS meta-lab dogfood
description: Experimental Observer-of-Observers for authorized repos; useful for maintainer dogfood and disposable public app trials.
subject:
  source: clone
  repos:
    - CorentinTh/it-tools
    - drawdb-io/drawdb
    - maciekt07/TodoApp
    - lissy93/dashy
  clone:
    fanout: 4
actors:
  - type: codex-app-server
execution:
  target: e2b-desktop
scenario:
  mode: live
defaults:
  open: true
