schema: humanish.lab.v2
id: terminal-product-demo
title: Terminal-product real-agent study (dry-run contract; neutral mock CLI)
description: >
  A real autonomous terminal agent (codex-exec) discovers and uses a CLI/product
  from PUBLIC SURFACES ONLY, inside an E2B shell, capped at no-spend. This neutral
  fixture stays dry-run for CI and produces a verified contract-only bundle. The
  shipped live terminal-product route and command-scoped credential boundary are
  not exercised by this fixture; this FICTIONAL mock CLI does not claim live or
  adopter proof.
subject:
  source: terminal-product
  product:
    name: widgetsmith-cli # FICTIONAL mock CLI — neutral name for the public CI fixture
    publicSurfaces:
      - https://example.com/widgetsmith
      - https://example.com/widgetsmith/llms.txt
      - https://example.com/widgetsmith/skill.md
actors:
  - type: codex-exec # REAL dispatch key: resolves to the registered terminal actor
    persona: autonomous-creative-agent # composed into the agent prompt + bundle provenance
    mission: >- # public-safe author text; recorded plaintext, composed prompt bound by digest
      You are an autonomous agent. Discover widgetsmith-cli from its public surfaces and
      determine whether it can help with a durable real task. Stay within the declared
      no-spend caps. Leave feedback if the workflow is confusing.
execution:
  target: e2b-terminal # optional; absent defaults to e2b-terminal on this route
  runtimeAuth: openai-env # dry-run records the name; live injects the key command-scoped only
  timeoutMs: 600000 # agent session wall-clock budget
  terminal:
    transport: exec-stream # captured non-interactive exec output (NOT an interactive PTY)
    stdin: disabled # autonomous + comparable to an unassisted baseline
scenario:
  mode: dry-run # neutral CI fixture; the shipped live route remains explicitly gated
  caps:
    maxUsd: 0 # no-spend by default
    maxJobs: 0 # no billable product jobs
    maxMinutes: 10
policies:
  # deny-by-default credential boundary: live execution passes only the runtime LLM key to the
  # agent command; everything else is excluded by construction.
  allowPrivateRepoAccess: false
  allowProviderCredentials: false
  allowPaymentCredentials: false
  allowGitHubMutation: false
