schema: humanish.lab.v2
id: shared-world-demo
title: Shared-world topology (sequential, deterministic dry-run; neutral multi-role app)
description: >
  Two distinct roles drive ONE shared, mutable service plane (one app + one seeded DB) so their
  actions interact through shared state — the DECLARED override of the per-lane-worlds default
  (#164). ONE sandbox clones + serves + seeds the app ONCE; then each role SEAT takes a turn IN
  DECLARED ORDER from its own isolated Chrome profile against the shared loopback app. A read-only
  state CHECKPOINT runs at baseline + after each role's turn, producing a harness-clocked timeline
  that proves role-reviewer acted on a world already containing role-author's mutation. Dry-run
  (the default) emits ONE run bundle with the shared-world evidence block (attributionClass:
  shared-world + the mandatory attributionLimits) at $0 — no sandbox, no provider tokens. A live
  run needs OPENAI_API_KEY + E2B_API_KEY, scenario.mode: live, and a real stateful seeded app.
  The repo here is a FICTIONAL neutral collaboration app for CI; real adopter subjects live in
  operator docs only.
subject:
  source: clone
  topology: shared-world # the declared override of the per-lane-worlds default (#164)
  repos:
    - example-org/collab-notes-app # FICTIONAL neutral multi-role app for the public CI fixture
  clone:
    depth: 1
  env:
    - DATABASE_URL # provisioned by NAME from --env-file; the value never persists
  serve:
    install: pnpm install --frozen-lockfile
    build: pnpm build
    start: pnpm start
    url: http://127.0.0.1:3000/ # loopback: ONE shared app every role drives
  state:
    # Seed the shared plane ONCE (before the server starts). Persisted as a command DIGEST only.
    seed:
      - name: db-migrate
        command: pnpm db:migrate
        when: before-start
      - name: seed-baseline
        command: pnpm db:seed
        when: before-start
    # Read-only digest probes run at baseline + after each role's turn. Only sha256-16(scrubbed
    # stdout) persists — never the raw value. The deltas across snapshots ARE the interaction proof.
    checkpoint:
      - name: notes-count
        command: psql "$DATABASE_URL" -tAc "select count(*) from notes"
        redact: [] # extra literal values to scrub from this probe's stdout (none here)
      - name: reviews-count
        command: psql "$DATABASE_URL" -tAc "select count(*) from reviews"
actors:
  - type: openai-computer-use # REAL dispatch key: resolves in the actor registry
    mission: Use the shared app to accomplish your role's task, then stop.
    # The roster IS the role roster (≥2 roles; NO parallel roles[] field). Roles take turns IN
    # DECLARED ORDER against the ONE shared plane. Each role's `entry` is a same-origin loopback
    # route appended to serve.url; the seat opens it in a fresh isolated Chrome profile.
    lanes:
      - id: role-author
        persona: contributor
        entry: /compose
        instruction: Create a new note titled "Launch checklist" and publish it.
      - id: role-reviewer
        persona: reviewer
        entry: /inbox
        instruction: Open the most recent published note and leave one review comment.
execution:
  target: e2b-desktop # required: the role seats drive a hosted desktop browser
  timeoutMs: 120000 # PER-ROLE session budget (sequential turns; no run-level wall clock)
scenario:
  mode: dry-run # default; the live path provisions a real sandbox + plane — gated
