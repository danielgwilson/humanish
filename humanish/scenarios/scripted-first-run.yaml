schema: humanish.scenario.v1
id: scripted-first-run
title: First-run scripted walkthrough
goal: Load the app, submit the primary form, and confirm the success state renders.
browser:
  startPath: /
  steps:
    - id: step-01-load
      label: Load landing page
      action: goto
      path: /
      expect:
        selectorVisible: "main"
    - id: step-02-fill-email
      label: Fill the signup email
      action: fill
      selector: "input[type='email']"
      value: synthetic.user@example.test
    - id: step-03-submit
      label: Submit the form
      action: click
      selector: "button[type='submit']"
      expect:
        stateChanged: true
    - id: step-04-confirm
      label: Confirm success copy
      action: waitForText
      expect:
        text: "Welcome"
